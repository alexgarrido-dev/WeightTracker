name: Actualizar Dashboard Notion

on:
  schedule:
    - cron: '0 6 * * *' 
  workflow_dispatch: 

# 🔄 SOLUCIÓN AL ERROR: Damos permiso explícito al bot para guardar archivos
permissions:
  contents: write 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4 

      - name: Instalar Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.10'

      - name: Comprobar archivos (Debug)
        # Este paso nos mostrará qué archivos hay realmente en la carpeta
        run: ls -la

      - name: Instalar librerías
        # 🔄 SOLUCIÓN PREVENTIVA: Usamos una forma más robusta de llamar a pip
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Ejecutar script de Python
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: WeightTracker_Analysis.py

      - name: Guardar el nuevo HTML en GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add peso.html
          git commit -m "Actualización automática del dashboard" || echo "Sin cambios"
          git push
