name: Actualizar Dashboard Notion

on:
  schedule:
    - cron: '0 6 * * *' 
  workflow_dispatch: 

# 🔄 SOLUCIÓN AL ERROR: Damos permiso explícito al bot para guardar archivos
permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        # 🔄 SOLUCIÓN AL WARNING: Actualizado a v4
        uses: actions/checkout@v4 

      - name: Instalar Python
        # 🔄 SOLUCIÓN AL WARNING: Actualizado a v5
        uses: actions/setup-python@v5 
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: pip install -r requirements.txt

      - name: Ejecutar script de Python
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        # ⚠️ IMPORTANTE: Asegúrate de que tu archivo de Python se llama exactamente "main.py". 
        # Si se llama distinto, cámbialo en esta línea.
        run: WeightTracker_Analysis.py

      - name: Guardar el nuevo HTML en GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add peso.html
          git commit -m "Actualización automática del dashboard" || echo "Sin cambios"
          git push
