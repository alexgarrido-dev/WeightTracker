<style>
    body { background: #FAFAFA; margin: 0; padding: 24px; font-family: 'DM Sans', Arial, sans-serif; }
    
    .kpi-container { 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
        gap: 16px; 
        margin-bottom: 24px; 
    }
    
    .kpi-card {
        background: white; border: 1px solid #E4E2DA; border-radius: 8px;
        padding: 16px; display: flex; align-items: center; gap: 14px;
        box-shadow: 0px 1px 3px rgba(0,0,0,0.04);
    }
    
    .kpi-icon { font-size: 24px; }
    .kpi-data { display: flex; flex-direction: column; }
    .kpi-val { font-size: 18px; font-weight: 600; color: #2C2C2A; }
    .kpi-label { font-size: 11px; letter-spacing: 0.05em; color: #888780; text-transform: uppercase; margin-top: 4px; }
    
    /* Clase para el subtexto base sin color predefinido, el color se inyecta por estilo inline */
    .kpi-subtext { font-size: 11px; margin-top: 4px; font-weight: 600; }
    
    .main-svg { border-radius: 12px; }
</style>

</head>
